<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Task Tracker</title>
</head>
<body>
    <h1>My DevOps Project: Task Tracker</h1>
    
    <form action="/add" method="POST">
        <input type="text" name="content" placeholder="Enter a new task..." required>
        <button type="submit">Add Task</button>
    </form>

    <hr>

    <ul>
        {% for item in items %}
            <li>{{ item.text }}</li>
        {% endfor %}
    </ul>
</body>
</html>
